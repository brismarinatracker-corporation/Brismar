name: 🐛 Reporte de Error (Bug)
description: Reporta un error o comportamiento inesperado en la aplicación.
title: "[BUG] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Gracias por tomarte el tiempo de reportar este problema. Asegúrate de proporcionar la mayor cantidad de detalle posible para que el equipo pueda reproducirlo.
  - type: input
    id: version
    attributes:
      label: Versión de la Aplicación
      description: ¿En qué versión ocurrió el error? (Ej. 1.1.2)
      placeholder: v1.1.2
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Descripción del Error
      description: Describe clara y concisamente qué fue lo que falló.
      placeholder: Al intentar ingresar un peso negativo, la aplicación...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducirlo
      description: ¿Cómo podemos causar este error nosotros mismos?
      placeholder: |
        1. Entrar a la sección de...
        2. Hacer click en...
        3. El error ocurre cuando...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamiento Esperado
      description: ¿Qué debería haber pasado?
    validations:
      required: true
