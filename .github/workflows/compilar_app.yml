name: CI/CD — Brismar Tracker (App Móvil)

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build_apk:
    name: 📱 Analizar, Probar y Compilar APK (bris_tracker)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./bris_tracker

    steps:
      - name: ⬇️ Descargar Código (Checkout)
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17 (Requerido para Android)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🎯 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Obtener Dependencias
        run: flutter pub get

      - name: 🔍 Análisis Estático (flutter analyze)
        run: flutter analyze --no-fatal-infos

      - name: 🧪 Ejecutar Pruebas Unitarias e Integración
        run: flutter test

      - name: 🚀 Compilar APK (Release)
        run: flutter build apk --release

      - name: 📤 Subir APK a GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bris-tracker-release-apk
          path: bris_tracker/build/app/outputs/flutter-apk/app-release.apk
